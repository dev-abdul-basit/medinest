name: medinest
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+3

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.5
  sizer: ^2.0.15
  get_storage: ^2.1.1
  fluttertoast: ^8.2.1
  intl: ^0.18.1
  audioplayers: ^5.2.1
  url_launcher: ^6.1.11
  firebase_core: ^2.16.0
  firebase_auth: ^4.16.0
  google_sign_in: ^6.1.4
  image_picker: ^1.0.5
  equatable: ^2.0.5
  flutter_ringtone_player: ^4.0.0+2
#  sign_in_with_apple: ^5.0.0
  sqflite: ^2.3.0
  cloud_firestore: ^4.13.6
  connectivity_plus: ^5.0.2
  google_mobile_ads: ^4.0.0
  in_app_purchase: ^3.1.10
  dio: ^5.1.2
  flutter_local_notifications: ^19.1.0
  flutter_timezone: ^4.1.1
  image: ^4.0.17
  path_provider: ^2.0.0
  device_info_plus: ^9.1.1
  timezone: ^0.10.1
  firebase_messaging: ^14.6.6
  firebase_storage: ^11.5.6
  cupertino_icons: ^1.0.2
  smooth_page_indicator: ^1.1.0
  scroll_to_hide: ^2.0.1
  lottie: ^2.6.0
  screenshot: ^3.0.0
  share_plus: ^7.2.1
  in_app_review: ^2.0.8
  cached_network_image: ^3.3.0
  path: ^1.8.3
  in_app_purchase_platform_interface: ^1.3.6
  in_app_purchase_storekit: ^0.3.8
  crypto: ^3.0.3
  permission_handler: ^11.1.0
  firebase_app_check: ^0.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  change_app_package_name: ^1.5.0
  flutter_lints: ^5.0.0

dependency_overrides:
  flutter_inappwebview: ^6.0.0

flutter:

  uses-material-design: true
  assets:
    - assets/icons/
    - assets/sounds/
    - assets/database/
    - assets/images/
    - assets/
    - assets/fonts/
    - assets/animation/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins_Light.ttf
          weight: 400
        - asset: assets/fonts/Poppins_Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins_Regular.ttf
          weight: 600
        - asset: assets/fonts/Poppins_SemiBold.ttf
          weight: 700

    - family: NunitoSans
      fonts:
        - asset: assets/fonts/NunitoSans_Bold.ttf
          weight: 600
        - asset: assets/fonts/NunitoSans_ExtraBold.ttf
          weight: 700
        - asset: assets/fonts/NunitoSans_Medium.ttf
          weight: 300
        - asset: assets/fonts/NunitoSans_Regular.ttf
          weight: 400
        - asset: assets/fonts/NunitoSans_SemiBold.ttf
          weight: 500

    - family: LexendDeca
      fonts:
        - asset: assets/fonts/LexendDeca-Black.ttf
        - asset: assets/fonts/LexendDeca-Bold.ttf
        - asset: assets/fonts/LexendDeca-ExtraBold.ttf
        - asset: assets/fonts/LexendDeca-ExtraLight.ttf
        - asset: assets/fonts/LexendDeca-Light.ttf
          weight: 300
        - asset: assets/fonts/LexendDeca-Medium.ttf
          weight: 500
        - asset: assets/fonts/LexendDeca-Regular.ttf
          weight: 400
        - asset: assets/fonts/LexendDeca-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/LexendDeca-Thin.ttf

    - family: Righteous
      fonts:
        - asset: assets/fonts/Righteous_Regular.ttf
          weight: 400
