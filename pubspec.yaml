name: medinest
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.7+10

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.3
  sizer: ^3.1.3
  get_storage: ^2.1.1
  fluttertoast: ^9.0.0
  intl: ^0.20.2
  audioplayers: ^6.5.1
  url_launcher: ^6.3.2
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  google_sign_in: ^7.2.0
  image_picker: ^1.2.1
  equatable: ^2.0.7
  flutter_ringtone_player: ^4.0.0+4
#  sign_in_with_apple: ^5.0.0
  sqflite: ^2.4.2
  cloud_firestore: ^6.1.0
  connectivity_plus: ^7.0.0
  google_mobile_ads: ^6.0.0
  in_app_purchase: ^3.2.3
  dio: ^5.9.0
  flutter_local_notifications: ^19.5.0
  flutter_timezone: ^5.0.1
  image: ^4.5.4
  path_provider: ^2.1.5
  device_info_plus: ^12.3.0
  timezone: ^0.10.1
  firebase_messaging: ^16.0.4
  firebase_storage: ^13.0.4
  cupertino_icons: ^1.0.8
  smooth_page_indicator: ^1.2.1
  scroll_to_hide: ^2.2.1
  lottie: ^3.3.2
  screenshot: ^3.0.0
  share_plus: ^12.0.1
  in_app_review: ^2.0.11
  cached_network_image: ^3.4.1
  path: ^1.9.1
  in_app_purchase_platform_interface: ^1.4.0
  in_app_purchase_storekit: ^0.4.6+2
  crypto: ^3.0.7
  permission_handler: ^12.0.1
  firebase_app_check: ^0.4.1+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  change_app_package_name: ^1.5.0
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

dependency_overrides:
  flutter_inappwebview: ^6.0.0
flutter_launcher_icons:
  image_path_android: "assets/img_icon.png"
  image_path_ios: "assets/img_icon.png"
  android: "launcher_icon" # can specify file name here e.g. "ic_launcher"
  ios: true # can specify file name here e.g. "My-Launcher-Icon"
  adaptive_icon_background: "#FFFFFF" # only available for Android 8.0 devices and above
  adaptive_icon_foreground: "assets/img_icon.png" # only available for Android 8.0 devices and above
  adaptive_icon_foreground_inset: 16 # only available for Android 8.0 devices and above
  adaptive_icon_monochrome: "assets/img_icon.png" # only available for Android 13 devices and above
  min_sdk_android: 26 # android min sdk min:16, default 21
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  web:
    generate: true
    image_path: "assets/img_icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
flutter_native_splash:
  # Background color for all platforms (except Android 12+)
  # This is REQUIRED if you don't use background_image
  color: "#1976D2"  # Your blue color - change to your preference

  # The splash screen image (your app icon or custom splash image)
  # Should be sized for 4x pixel density (e.g., 512x512 or larger)
  image: assets/sp_icon.png

  # Optional: Dark mode variant
  # color_dark: "#042a49"
  # image_dark: assets/splash_dark.png

  # Optional: Branding image at bottom (like a logo or text)
  # branding: assets/branding.png
  # branding_mode: bottom

  # Android 12+ specific configuration (IMPORTANT!)
  android_12:
    # Background color for Android 12+
    color: "#1976D2"  # Match your main color

    # Center splash image for Android 12+
    # If not specified, launcher icon is used
    # With icon_background_color: 960×960 px (fit within circle 640px diameter)
    # Without icon_background_color: 1152×1152 px (fit within circle 768px diameter)
    # image: assets/splashscreen.png

    # Optional: Background color behind the icon (creates a circle)
    icon_background_color: "#FFFFFF"

    # Optional: Dark mode for Android 12+
    # color_dark: "#042a49"
    # image_dark: assets/splash_dark.png
    # icon_background_color_dark: "#000000"

  # Platform-specific settings
  android: true
  ios: true
  web: false  # Set to true if you want web splash

  # Fullscreen (hides notification bar on Android, iOS hides by default)
  fullscreen: true

  # Image positioning
  android_gravity: center
  ios_content_mode: center


flutter:

  uses-material-design: true
  assets:
    - assets/icons/
    - assets/sounds/
    - assets/database/
    - assets/images/
    - assets/
    - assets/fonts/
    - assets/animation/
    - assets/images/old/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins_Light.ttf
          weight: 400
        - asset: assets/fonts/Poppins_Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins_Regular.ttf
          weight: 600
        - asset: assets/fonts/Poppins_SemiBold.ttf
          weight: 700

    - family: NunitoSans
      fonts:
        - asset: assets/fonts/NunitoSans_Bold.ttf
          weight: 600
        - asset: assets/fonts/NunitoSans_ExtraBold.ttf
          weight: 700
        - asset: assets/fonts/NunitoSans_Medium.ttf
          weight: 300
        - asset: assets/fonts/NunitoSans_Regular.ttf
          weight: 400
        - asset: assets/fonts/NunitoSans_SemiBold.ttf
          weight: 500

    - family: LexendDeca
      fonts:
        - asset: assets/fonts/LexendDeca-Black.ttf
        - asset: assets/fonts/LexendDeca-Bold.ttf
        - asset: assets/fonts/LexendDeca-ExtraBold.ttf
        - asset: assets/fonts/LexendDeca-ExtraLight.ttf
        - asset: assets/fonts/LexendDeca-Light.ttf
          weight: 300
        - asset: assets/fonts/LexendDeca-Medium.ttf
          weight: 500
        - asset: assets/fonts/LexendDeca-Regular.ttf
          weight: 400
        - asset: assets/fonts/LexendDeca-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/LexendDeca-Thin.ttf

    - family: Righteous
      fonts:
        - asset: assets/fonts/Righteous_Regular.ttf
          weight: 400
